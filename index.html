<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Max</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Exo 2', sans-serif;
  background: #0b0b0f;
  color: white;
  overflow-x: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 16px;
  background: rgba(0,0,0,0.85);
  z-index: 10;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-family: 'Bebas Neue';
  color: #ff2e63;
  font-size: 22px;
  letter-spacing: 2px;
}

.btn {
  background: #ff2e63;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* SCREEN SYSTEM */
.screen { display: none; padding-top: 70px; }
.screen.active { display: block; }

/* HERO */
.hero {
  padding: 20px;
}

.hero h1 {
  font-size: 34px;
}

.hero p {
  color: #aaa;
}

/* ROW */
.row {
  padding: 10px 16px;
}

.row h2 {
  font-size: 16px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card p {
  margin: 6px;
  font-size: 13px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: rgba(0,0,0,0.9);
}

.nav button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.popup-content {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  max-width: 360px;
  text-align: center;
}

.popup img {
  width: 100%;
  border-radius: 10px;
}

.close {
  margin-top: 10px;
  background: #ff2e63;
  border: none;
  padding: 8px;
  color: white;
  border-radius: 6px;
}

/* SIGN UP */
input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">MOVIE MAX</div>
  <button class="btn" onclick="showScreen('signup')">Sign Up</button>
</div>

<!-- HOME -->
<div id="home" class="screen active">

  <div class="hero">
    <h1>Welcome to Movie Max</h1>
    <p>Stream & explore movies</p>
  </div>

  <div class="row">
    <h2>Trending</h2>

    <div class="grid">

      <div class="card" onclick="openMovie('Neon Eclipse','https://picsum.photos/300/450?1')">
        <img src="https://picsum.photos/300/450?1">
        <p>Neon Eclipse</p>
      </div>

      <div class="card" onclick="openMovie('Dark Horizon','https://picsum.photos/300/450?2')">
        <img src="https://picsum.photos/300/450?2">
        <p>Dark Horizon</p>
      </div>

      <div class="card" onclick="openMovie('Skyfall Code','https://picsum.photos/300/450?3')">
        <img src="https://picsum.photos/300/450?3">
        <p>Skyfall Code</p>
      </div>

    </div>
  </div>
</div>

<!-- SEARCH -->
<div id="search" class="screen">
  <div class="hero">
    <h1>Search</h1>
    <input placeholder="Search movies...">
  </div>
</div>

<!-- DOWNLOADS -->
<div id="downloads" class="screen">
  <div class="hero">
    <h1>Downloads</h1>
    <p>No downloads yet</p>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen">
  <div class="hero">
    <h1>Create Account</h1>

    <input placeholder="Username">
    <input placeholder="Email">
    <input placeholder="Password">

    <button class="btn">Register</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <img id="popupImg">
    <h3 id="popupTitle"></h3>
    <button class="close" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showScreen('home')">Home</button>
  <button onclick="showScreen('search')">Search</button>
  <button onclick="showScreen('downloads')">Downloads</button>
</div>

<script>
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openMovie(title, img){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupImg").src = img;
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
  </html>
