<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Max — Trident Technologies</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --black: #0D0D0D;
  --dark: #1A1A1A;
  --darker: #111111;
  --red: #FF2E63;
  --blue: #08D9D6;
  --white: #FFFFFF;
  --grey: #888;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Exo 2', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* HERO */
.hero {
  padding: 80px 20px;
  text-align: center;
  background: linear-gradient(135deg, #111, #000);
}

.hero h1 {
  font-size: 42px;
  color: var(--red);
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
}

.hero p {
  color: var(--grey);
  margin-top: 10px;
}

/* SECTION */
.section {
  padding: 20px;
}

.section h2 {
  margin-bottom: 12px;
  font-size: 18px;
  letter-spacing: 1px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
  background: #2a2a2a;
}

/* NAV */
.topnav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.8);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  color: var(--red);
  font-size: 22px;
  letter-spacing: 2px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="topnav">
  <div class="logo">MOVIE MAX</div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Movie Max</h1>
  <p>Stream & Discover Movies</p>
</section>

<!-- TRENDING -->
<section class="section">
  <h2>Trending Now</h2>
  <div class="grid">
    <div class="card">Neon Eclipse</div>
    <div class="card">Dark Horizon</div>
    <div class="card">Skyfall Code</div>
    <div class="card">Titan Night</div>
    <div class="card">Void Runner</div>
    <div class="card">Cyber Blade</div>
  </div>
</section>

<!-- POPULAR -->
<section class="section">
  <h2>Popular Movies</h2>
  <div class="grid">
    <div class="card">Alpha Zone</div>
    <div class="card">Night Drive</div>
    <div class="card">Solar Drift</div>
    <div class="card">Neon City</div>
  </div>
</section>

<!-- FOOTER SPACE -->
<div style="height: 80px;"></div>

</body>
</html>
